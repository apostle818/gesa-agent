services:
  gesa-agent:
    container_name: gesa-agent
    # Pulls the multi-arch image published by .github/workflows/docker-publish.yml.
    # Override with GESA_AGENT_IMAGE to pin a specific tag (e.g. sha-abc1234 or v1.2.3).
    # For local builds instead, comment out `image:` and uncomment the `build:` block.
    image: ${GESA_AGENT_IMAGE:-ghcr.io/apostle818/gesa-agent:latest}
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${GESA_AGENT_PORT:-3000}:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-7}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-large-latest}
      MISTRAL_MAX_RETRIES: ${MISTRAL_MAX_RETRIES:-4}
      # Optional: sync agent .md files to a private git repo so GUI edits
      # survive container restarts without a local volume. Leave blank to
      # fall back to the baked-in / locally-mounted agents/ directory.
      GESA_AGENTS_REPO_URL: ${GESA_AGENTS_REPO_URL:-}
      GESA_AGENTS_TOKEN: ${GESA_AGENTS_TOKEN:-}
      GESA_AGENTS_BRANCH: ${GESA_AGENTS_BRANCH:-main}
      GESA_AGENTS_COMMIT_NAME: ${GESA_AGENTS_COMMIT_NAME:-gesa-agent}
      GESA_AGENTS_COMMIT_EMAIL: ${GESA_AGENTS_COMMIT_EMAIL:-gesa-agent@localhost}
      NODE_ENV: production
    # Mount your own agent prompts over the baked-in ones. Drop :ro if you
    # want GUI edits to persist here instead of (or alongside) the git repo.
    # volumes:
    #   - ./agents:/app/agents
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
