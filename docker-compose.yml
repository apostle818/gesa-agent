services:
  gesa-agent:
    container_name: gesa-agent
    # For Portainer: use the prebuilt image once published, e.g.
    #   image: ghcr.io/apostle818/gesa-agent:latest
    # or let Portainer build from the repository context below.
    build:
      context: .
      dockerfile: Dockerfile
    image: gesa-agent:latest
    restart: unless-stopped
    ports:
      - "${GESA_AGENT_PORT:-3000}:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      NODE_ENV: production
    # Mount your own agent prompts over the baked-in ones (optional).
    # volumes:
    #   - ./agents:/app/agents:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
